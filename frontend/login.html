<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Car Wash Management</title>
    <link rel="icon" type="image/png" href="new logo.png?v=washhub">
    <link rel="shortcut icon" type="image/png" href="new logo.png?v=washhub">
    <link rel="apple-touch-icon" href="new logo.png?v=washhub">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Open+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--neutral-bg-light);
            padding: 20px;
            box-sizing: border-box;
        }
        .login-container {
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container h2 {
            font-family: var(--font-headings);
            color: var(--secondary-accent);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background-color: #16a085;
        }
        #login-message {
            margin-top: 15px;
            font-size: 0.9em;
        }
        
        /* Mobile Styles */
        @media screen and (max-width: 480px) {
            body {
                padding: 15px;
            }
            .login-container {
                padding: 30px 20px;
                max-width: 100%;
            }
            .login-container h2 {
                font-size: 1.5rem;
                margin-bottom: 25px;
            }
            .form-group input {
                padding: 12px;
                font-size: 16px; /* Prevents zoom on iOS */
            }
            .submit-btn {
                padding: 14px;
                font-size: 16px;
            }
        }
        
        @media screen and (max-width: 320px) {
            .login-container {
                padding: 25px 15px;
            }
            .login-container h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>CarWashCo Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="submit-btn">Login</button>
        </form>
        <div id="login-message"></div>
    </div>
    <script src="login.js"></script>
</body>
</html>
