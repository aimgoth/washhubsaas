services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: washhub-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=carwash_db
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
      - APP_NAME=WashHub
      - APP_URL=http://localhost:8080
      - RUNNING_IN_DOCKER=true
    networks:
      - washhub-network

  db:
    image: mysql:8.0
    container_name: washhub-db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=carwash_db
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database-seed:/docker-entrypoint-initdb.d
    networks:
      - washhub-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: washhub-phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=rootpassword
    depends_on:
      - db
    networks:
      - washhub-network

volumes:
  mysql-data:

networks:
  washhub-network:
    driver: bridge
